name: Ops Status

on:
  schedule:
    - cron: '30 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  update-ops-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate payment queue
        run: python src/generators/payment_status_generator.py

      - name: Update ops issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_ops_issue.py
