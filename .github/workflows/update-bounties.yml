name: Update Bounties

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily
  push:
    branches: [ update ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-bounties:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run bounty finder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.bounty_finder

      - name: Validate generated output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.tests.run_bounty_check

      - name: Commit and push if changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ README.md docs/ongoing-programs.md
          if git diff --cached --quiet; then
            echo "No bounty data changes."
          else
            git commit -m "Update bounties: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
