name: Report missing bounty
description: Ask bot/maintainers to track a missing bounty.
title: "[Missing bounty] "
labels: ["missing-bounty"]
body:
  - type: input
    id: url
    attributes:
      label: Bounty issue URL
      description: GitHub issue URL.
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository
      description: owner/repo
    validations:
      required: true
  - type: input
    id: value
    attributes:
      label: Value
      description: Amount and currency if known.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
    validations:
      required: false
